<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="topbar">
        <button onclick="window.location.href='home.html'">
            Home
        </button>

        <button onclick="window.location.href='produtos.html'">
            Produtos
        </button>
    </div>

    <h2 class="titulo">Histórico</h2>

    <select id="periodoCliente" onchange="carregarHistorico()"></select>

    <div id="lista" class="historico-lista"></div>

    <div id="total" class="historico-total"></div>

</div>

<script>
async function init() {
    const token = localStorage.getItem("token");

    if (!token) {
        window.location.href = "login.html";
        return;
    }

    const res = await fetch("/me", {
        headers: { Authorization: token }
    });

    if (!res.ok) {
        localStorage.removeItem("token");
        window.location.href = "login.html";
        return;
    }

    await carregarPeriodosCliente();
    await carregarHistorico();
}

async function carregarPeriodosCliente() {
    const token = localStorage.getItem("token");

    const res = await fetch("/periodos", {
        headers: { Authorization: token }
    });

    if (!res.ok) {
        alert("Erro ao carregar meses");
        return;
    }

    const data = await res.json();

    const select = document.getElementById("periodoCliente");
    select.innerHTML = "";

    data.forEach(p => {
        select.innerHTML += `
            <option value="${p.id}">
                ${p.nome} ${p.fechado ? "(fechado)" : "(atual)"}
            </option>
        `;
    });
}

async function carregarHistorico() {
    const token = localStorage.getItem("token");
    const periodoId = document.getElementById("periodoCliente").value;

    if (!periodoId) return;

    const res = await fetch(`/historico/${periodoId}`, {
        headers: { Authorization: token }
    });

    if (!res.ok) {
        alert("Erro ao carregar histórico");
        return;
    }

    const data = await res.json();

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    if (data.itens.length === 0) {
        lista.innerHTML = `
            <div class="historico-item">
                Nenhum consumo registrado neste mês.
            </div>
        `;
    }

    data.itens.forEach(item => {
        lista.innerHTML += `
            <div class="historico-item">

                <div class="linha1">
                    <span class="produto">${item.produto}</span>
                    <span class="total">R$ ${item.total.toFixed(2)}</span>
                </div>

                <div class="linha2">
                    <span>${item.qtd}x</span>
                    <span>${item.data}</span>
                </div>

                ${
                    item.admin
                    ? `<div class="admin-info">
                            adicionado por admin (${item.admin})
                       </div>`
                    : ""
                }

            </div>
        `;
    });

    document.getElementById("total").innerText =
        "TOTAL: R$ " + data.total.toFixed(2);
}

init();
</script>

<style>
.titulo {
    text-align: center;
}

.topbar {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 20px;
    width: 100%;
}

.topbar button {
    flex: 1;
    padding: 12px;
    background: #334155;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    font-size: 14px;
}

.topbar button:hover {
    background: #475569;
}

#periodoCliente {
    margin-bottom: 15px;
}
</style>

</body>
</html>
